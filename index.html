<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<h1>📋 Kanban Board</h1>

<div class="add-task">

<input
type="text"
id="taskInput"
placeholder="Enter task">

<button onclick="addTask()">
Add Card
</button>

</div>

<div class="board">

<div class="column">

<h2>To Do</h2>

<div
class="task-list"
id="todo"
ondrop="drop(event)"
ondragover="allowDrop(event)">
</div>

</div>

<div class="column">

<h2>In Progress</h2>

<div
class="task-list"
id="progress"
ondrop="drop(event)"
ondragover="allowDrop(event)">
</div>

</div>

<div class="column">

<h2>Done</h2>

<div
class="task-list"
id="done"
ondrop="drop(event)"
ondragover="allowDrop(event)">
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
