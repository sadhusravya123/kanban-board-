<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📋 Kanban Board</h1>

<p class="subtitle">
Organize your work efficiently. Changes are saved automatically.
</p>

<div class="add-task">

<input
id="taskInput"
type="text"
placeholder="Enter a task...">

<button id="addBtn">
Add Card
</button>

</div>

<div class="board">

<div class="column">

<h2>
📝 To Do
<span id="todoCount">(0)</span>
</h2>

<div class="task-list" id="todo"></div>

</div>

<div class="column">

<h2>
🚀 In Progress
<span id="progressCount">(0)</span>
</h2>

<div class="task-list" id="progress"></div>

</div>

<div class="column">

<h2>
✅ Done
<span id="doneCount">(0)</span>
</h2>

<div class="task-list" id="done"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
